<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Симулятор TOPIK I · ILS</title>
  <style>
    :root {
      --primary: #3b82f6;
      --bg-main: #090d16;
      --bg-card: rgba(17, 24, 39, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent-green: #34d399;
      --accent-red: #f87171;
    }
    body {
      background-color: var(--bg-main);
      background-image: radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--text-main); margin: 0; padding: 0;
    }
    .test-header { background: rgba(9, 13, 22, 0.8); border-bottom: 1px solid var(--border); padding: 15px 20px; }
    .test-header-inner { max-width: 900px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .logo-kor { background: linear-gradient(135deg, #3b82f6, #60a5fa); color: #0f172a; font-weight: 800; padding: 2px 8px; border-radius: 6px; margin-right: 5px; }
    .test-grid { display: grid; grid-template-columns: 1fr 300px; gap: 25px; max-width: 900px; margin: 30px auto; padding: 0 20px; }
    @media (max-width: 768px) { .test-grid { grid-template-columns: 1fr; } }
    
    .variant-menu { max-width: 600px; margin: 40px auto; padding: 30px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; text-align: center; }
    .variant-btn { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); color: #60a5fa; padding: 14px; border-radius: 12px; width: 100%; font-size: 1rem; font-weight: 600; margin: 8px 0; cursor: pointer; transition: all 0.2s; text-align: left; padding-left: 20px; }
    .variant-btn:hover { background: var(--primary); color: #fff; transform: translateY(-2px); }

    .student-guide { background: rgba(59, 130, 246, 0.04); border: 1px solid rgba(59, 130, 246, 0.2); border-radius: 16px; padding: 20px; }
    .audio-block { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2); border-radius: 16px; padding: 15px; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; }
    .audio-play-btn { background: var(--primary); color: #fff; border: none; width: 42px; height: 42px; border-radius: 50%; font-size: 1.1rem; cursor: pointer; }
    .question-block { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .answer-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); color: var(--text-main); padding: 16px 20px; border-radius: 12px; width: 100%; text-align: left; font-size: 1.05rem; margin: 10px 0; cursor: pointer; transition: all 0.2s; }
    .answer-btn:hover { border-color: rgba(59, 130, 246, 0.4); }
    .notes-textarea { background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 12px; width: 100%; box-sizing: border-box; font-family: inherit; }
    .ai-hint { margin-top: 20px; padding: 15px; border-radius: 12px; background: rgba(255, 255, 255, 0.05); border-left: 4px solid var(--primary); }
    .btn { padding: 12px 24px; font-size: 0.95rem; font-weight: 600; border-radius: 10px; cursor: pointer; border: none; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-secondary { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); color: #fff; }
  </style>
</head>
<body>

  <div id="welcome-screen" class="variant-menu">
    <div style="font-size: 2.5rem; margin-bottom: 10px;">🇰🇷</div>
    <h2 style="margin-top: 0; font-size: 1.6rem;">Выбор варианта TOPIK I</h2>
    <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 25px;">4 варианта по 5 уникальных вопросов (1-2 급).</p>
    <button class="variant-btn" onclick="startTest(1)">📝 Вариант 1: Будни и ежедневные дела</button>
    <button class="variant-btn" onclick="startTest(2)">📝 Вариант 2: Покупки и увлечения</button>
    <button class="variant-btn" onclick="startTest(3)">📝 Вариант 3: Семья, погода и транспорт</button>
    <button class="variant-btn" onclick="startTest(4)">📝 Вариант 4: Выходные и планы на будущее</button>
    <div style="margin-top: 20px;"><a href="index.html" style="color: var(--text-muted); font-size: 0.9rem; text-decoration: none;">← Вернуться на главную</a></div>
  </div>

  <div id="test-screen" style="display: none;">
    <header class="test-header">
      <div class="test-header-inner">
        <div style="font-weight:800; font-size:1.2rem;"><span class="logo-kor">한국</span>TOPIK I · <span id="header-variant-title">Вариант</span></div>
        <div style="color: var(--text-muted);">Вопрос <span id="current-q">1</span> из <span id="total-q">5</span></div>
      </div>
    </header>

    <div class="test-grid">
      <main>
        <h2 id="part-title" style="font-size: 1.4rem; margin: 0 0 5px 0;">Загрузка...</h2>
        <p id="part-desc" style="color: var(--text-muted); font-size: 0.95rem; margin: 0 0 25px 0;"></p>

        <div class="audio-block" id="audio-block" hidden>
          <button type="button" class="audio-play-btn" id="play-btn">▶</button>
          <div>
            <p style="margin:0; font-weight:600; font-size: 0.95rem;">듣기 (Аудиозапись задания)</p>
            <span style="font-size:0.8rem; color:#60a5fa;">🔄 Воспроизведение через TTS</span>
          </div>
        </div>

        <div class="question-block">
          <div id="q-text" style="font-size: 1.25rem; font-weight:700; margin-bottom: 20px; white-space: pre-line;"></div>
          <div id="answers-container"></div>
          <div class="ai-hint" id="ai-hint" hidden><p id="ai-hint-text" style="margin:0; font-size:0.95rem;"></p></div>
          <div style="margin-top: 25px; border-top: 1px solid var(--border); padding-top: 20px;">
            <label style="display:block; font-size:0.85rem; color:var(--text-muted); margin-bottom:8px; font-weight:600;">📝 Черновик для перевода и заметок:</label>
            <textarea class="notes-textarea" id="student-notes" rows="2" placeholder="Сюда можно выписать незнакомые слова..."></textarea>
          </div>
        </div>
        <div style="display: flex; justify-content: space-between; margin-top: 25px;">
          <button class="btn btn-secondary" id="prev-btn">← Назад</button>
          <button class="btn btn-primary" id="next-btn">Далее →</button>
        </div>
      </main>
      <aside>
        <div class="student-guide">
          <h3 style="font-weight: 700; color: #60a5fa; margin-top: 0; font-size: 1rem;">💡 Инструкция эксперта</h3>
          <p id="guide-content" style="margin: 0; font-size: 0.9rem; line-height: 1.5;"></p>
        </div>
      </aside>
    </div>
  </div>

  <script>
    const database = {
      variant1: [
        { part: "듣기 (Аудирование — Действие)", desc: "Послушайте вопрос и выберите логичный ответ о текущем действии.", text: "Слушайте аудио и выберите подходящую реплику:", tts: "지금 무엇을 해요?", options: ["A) 한국어를 공부해요. (Изучаю корейский язык)", "B) 내일 만나요. (Встретимся завтра)", "C) 가방이 커요. (Сумка большая)"], correct: 0, guide: "Спикер спрашивает '지금 무엇을 해요?' (Что ты сейчас делаешь?). Вариант А отвечает на этот вопрос прямо." },
        { part: "읽기 (Чтение — Локации)", desc: "Определите место работы, основываясь на контекстных маркерах профессии.", text: "Выберите правильное слово для пропуска:\n'저는 의사입니다. (_______)에서 일합니다.'", options: ["A) 은행 (Банк)", "B) 공항 (Аэропорт)", "C) 병원 (Больница)"], correct: 2, guide: "Ключевое слово здесь — '의사' (врач). Место работы врача — '병원' (больница)." },
        { part: "읽기 (Чтение — Тематика)", desc: "Прочитайте короткий текст и выберите его главную тему.", text: "Определите тему сообщения:\n'이번 주 토요일에 우리 집에서 파티를 합니다. 친구들이 모두 옵니다. 꼭 오세요.'", options: ["A) 날씨 (Погода)", "B) 초대 (Приглашение)", "C) 취미 (Хобби)"], correct: 1, guide: "Словосочетания '우리 집에서 파티' (вечеринка у меня дома) и '꼭 오세요' (обязательно приходите) переводятся как приглашение." },
        { part: "읽기 (Чтение — Грамматика времени)", desc: "Выберите правильный временной показатель для предложения.", text: "Вставьте нужное слово:\n'저는 (_______) 저녁에 친구와 영화를 봤습니다.'", options: ["A) 내일 (Завтра)", "B) 어제 (Вчера)", "C) 지금 (Сейчас)"], correct: 1, guide: "Глагол стоит в прошедшем времени — '봤습니다' (смотрел). Значит, маркером времени должно быть '어제' (вчера)." },
        { part: "읽기 (Чтение — Отрицание)", desc: "Правильно примените отрицательную конструкцию в бытовом контексте.", text: "Какое слово логически завершает диалог?\nА: 매운 음식을 잘 먹어요?\nВ: 아니요, 잘 (_______).", options: ["A) 먹어요 (Ем)", "B) 못 먹어요 (Не могу есть)", "C) 좋아해요 (Люблю)"], correct: 1, guide: "Ответ начинается с '아니요' (Нет). Конструкция '잘 못 먹어요' означает, что человек плохо справляется с острой едой." }
      ],
      variant2: [
        { part: "듣기 (Аудирование — Покупки)", desc: "Послушайте вопрос покупателя и определите логичный ответ продавца.", text: "Слушайте аудио и выберите правильный ответ:", tts: "이 사과 얼마예요?", options: ["A) 세 개에 삼천 원입니다. (3 штуки за 3000 вон)", "B) 사과가 맛있어요. (Яблоко вкусное)", "C) 시장에 가요. (Иду на рынок)"], correct: 0, guide: "Вопрос '얼마예요?' переводится как 'Сколько стоит?'. Правильный ответ содержит цену в вонах (원)." },
        { part: "읽기 (Чтение — Направление)", desc: "Выберите правильное падежное окончание направления.", text: "Вставьте пропущенную частицу:\n'저는 오늘 친구와 함께 학교(____) 가요.'", options: ["A) 에 (Падеж направления)", "B) 에서 (Падеж места действия)", "C) 를 (Винительный падеж)"], correct: 0, guide: "С глаголом движения '가요' (иду) всегда используется окончание направления '에'." },
        { part: "읽기 (Чтение — Погода)", desc: "Проанализируйте погодную логику предложения.", text: "Какое существительное пропущено?\n'밖을 보니 비가 많이 옵니다. 그래서 (_______)을 씁니다.'", options: ["A) 바지 (Брюки)", "B) 모자 (Кепка)", "C) 우산 (Зонт)"], correct: 2, guide: "Если идет дождь ('비가 옵니다'), логично использовать зонт ('우산')." },
        { part: "읽기 (Чтение — Противопоставление)", desc: "Выберите правильный соединительный союз.", text: "Заполните пропуск союзом:\n'동생은 키가 큽니다. (_______) 저는 키가 작습니다.'", options: ["A) 그리고 (И / Также)", "B) 하지만 (Но / Однако)", "C) 그래서 (Поэтому)"], correct: 1, guide: "Предложения противопоставлены: брат высокий, а я низкий. Нужен союз '하지만' (Но)." },
        { part: "읽기 (Чтение — Счётные слова)", desc: "Подберите правильное счётное слово для напитков.", text: "Вставьте счётное слово:\n'커피 두 (_______) 주세요.'", options: ["A) 명 (Для людей)", "B) 권 (Для книг)", "C) 잔 (Для чашек/бокалов)"], correct: 2, guide: "Кофе и напитки в стаканах считаются с помощью суффикса '잔'." }
      ],
      variant3: [
        { part: "듣기 (Аудирование — Семья)", desc: "Послушайте вопрос о составе семьи и выберите логичный ответ.", text: "Слушайте аудио и выберите подходящую реплику:", tts: "가족이 몇 명이에요?", options: ["A) 우리 가족이에요. (Это моя семья)", "B) 아버지와 어머니, 저 세 명이에요. (Отец, мать и я — три человека)", "C) 동생이 집색입니다. (У брата домашний цвет — некорректно)"], correct: 1, guide: "Вопрос '몇 명이에요?' спрашивает 'Сколько человек?'. Ответ Б четко перечисляет членов семьи и дает число." },
        { part: "읽기 (Чтение — Транспорт)", desc: "Определите способ передвижения на основе временных затрат.", text: "Вставьте нужное слово:\n'회사가 멉니다. 그래서 매일 (_______)을 타고 갑니다.'", options: ["A) 지하철 (Метро)", "B) 구두 (Туфли)", "C) 의자 (Стул)"], correct: 0, guide: "С глаголом '타고 갑니다' (ехать на чём-то) из списка сочетается только транспортное средство '지하철' (метро)." },
        { part: "읽기 (Чтение — Дни недели)", desc: "Проверьте понимание последовательности календарных дней.", text: "Какое слово должно стоять вместо пропуска?\n'오늘이 수요일입니다. (_______)은 목요일입니다.'", options: ["A) 어제 (Вчера)", "B) 내일 (Завтра)", "C) 모레 (Послезавтра)"], correct: 1, guide: "Если сегодня среда (수요일), то четверг (목요일) — это завтра (내일)." },
        { part: "읽기 (Чтение — Частицы места)", desc: "Определите падеж места активного действия.", text: "Вставьте правильную частицу:\n'도서관(_______) 책을 읽고 공부를 했습니다.'", options: ["A) 에 (В - направление/нахождение)", "B) 에서 (В - место действия)", "C) 에게 (Кому-то)"], correct: 1, guide: "В библиотеке происходит активное действие — чтение книг и учеба. Используем частицу места действия '에서'." },
        { part: "읽기 (Чтение — Состояние)", desc: "Подберите противоположное по смыслу прилагательное.", text: "Завершите фразу:\n'이 교실은 너무 시끄럽습니다. 저 교실은 (_______).'", options: ["A) 넓습니다 (Широкий)", "B) 조용합니다 (Тихий)", "C) 가깝습니다 (Близкий)"], correct: 1, guide: "Антоним к слову '시끄럽다' (шумный) — это '조용하다' (тихий)." }
      ],
      variant4: [
        { part: "듣기 (Аудирование — Состояние здоровья)", desc: "Послушайте вопрос о самочувствии и выберите подходящий ответ.", text: "Слушайте аудио и ответьте на вопрос:", tts: "어디가 아파요?", options: ["A) 머리가 아파요. (Болит голова)", "B) 병원에 가세요. (Сходите в больницу)", "C) 약국이 커요. (Аптека большая)"], correct: 0, guide: "Вопрос '어디가 아파요?' означает 'Что у вас болит?'. Прямой ответ на него — '머리가 아파요' (Болит голова)." },
        { part: "읽기 (Чтение — Планирование)", desc: "Определите грамматику намерения сделать что-либо.", text: "Вставьте грамматическую конструкцию намерения:\n'주말에 친구와 축구를 (_______).'", options: ["A) 했습니다 (Сыграл)", "B) 하려고 합니다 (Собираюсь сыграть)", "C) 하지 않습니다 (Не играю)"], correct: 1, guide: "Маркер '주말에' (в выходные) в контексте планов отлично сочетается с конструкцией намерения '-(으)려고 합니다'." },
        { part: "읽기 (Чтение — Вкусы/Еда)", desc: "Выберите логическое описание вкусовых качеств.", text: "Какое слово подходит по контексту?\n'아이스크림이 아주 (_______). 그래서 좋아해요.'", options: ["A) 달아요 (Сладкий)", "B) 매워요 (Острый)", "C) 짭니다 (Соленый)"], correct: 0, guide: "Мороженое (아이스크림) по своей природе сладкое ('달다')." },
        { part: "읽기 (Чтение — Частицы совместности)", desc: "Примените правильный союз 'и/с кем-то' в разговорной речи.", text: "Заполните пропуск:\n'어제 형(_______) 같이 시장에 가서 수박을 샀어요.'", options: ["A) 하고 (С / И)", "B) 에서 (В / Из)", "C) 에게 (К кому-то)"], guide: "Для обозначения совместного действия с кем-то ('вместе с братом') используется разговорная частица '하고'.", correct: 0 },
        { part: "읽기 (Чтение — Профессии)", desc: "Узнайте профессию человека по описанию его обязанностей.", text: "О какой профессии идет речь?\n'학생들을 가르칩니다. 학교에서 일합니다.'", options: ["A) 요리사 (Повар)", "B) 선생님 (Учитель)", "C) 경찰관 (Полицейский)"], correct: 1, guide: "Человек, который обучает студентов ('학생들을 가르칩니다') в школе — это учитель ('선생님')." }
      ]
    };

    let activeQuestions = []; let currentIdx = 0; const userAnswers = {}; const notesCache = {};

    function startTest(variantNum) {
      document.getElementById('welcome-screen').style.display = 'none';
      document.getElementById('test-screen').style.display = 'block';
      document.getElementById('header-variant-title').textContent = "Вариант " + variantNum;
      if(variantNum === 1) activeQuestions = database.variant1;
      else if(variantNum === 2) activeQuestions = database.variant2;
      else if(variantNum === 3) activeQuestions = database.variant3;
      else activeQuestions = database.variant4;
      currentIdx = 0; render();
    }

    function render() {
      const q = activeQuestions[currentIdx];
      document.getElementById('current-q').textContent = currentIdx + 1;
      document.getElementById('total-q').textContent = activeQuestions.length;
      document.getElementById('part-title').textContent = q.part;
      document.getElementById('part-desc').textContent = q.desc;
      document.getElementById('q-text').textContent = q.text;
      document.getElementById('guide-content').textContent = q.guide;
      
      const notesTextarea = document.getElementById('student-notes');
      notesTextarea.value = notesCache[currentIdx] || '';
      notesTextarea.oninput = () => { notesCache[currentIdx] = notesTextarea.value; };
      
      const container = document.getElementById('answers-container');
      const hint = document.getElementById('ai-hint');
      container.innerHTML = ''; hint.hidden = true;
      
      document.getElementById('audio-block').hidden = !q.tts;

      q.options.forEach((opt, idx) => {
        const btn = document.createElement('button'); btn.className = 'answer-btn'; btn.textContent = opt;
        if (userAnswers[currentIdx] === idx) {
          hint.hidden = false;
          if (idx === q.correct) {
            btn.style.borderColor = 'var(--accent-green)';
            document.getElementById('ai-hint-text').innerHTML = "<span style='color:var(--accent-green);font-weight:700;'>정답입니다! 🎉 Верно!</span>";
          } else {
            btn.style.borderColor = 'var(--accent-red)';
            document.getElementById('ai-hint-text').innerHTML = "<span style='color:var(--accent-red);font-weight:700;'>틀렸습니다. Попробуйте еще раз.</span>";
          }
        }
        btn.onclick = () => { userAnswers[currentIdx] = idx; render(); };
        container.appendChild(btn);
      });
      document.getElementById('prev-btn').disabled = currentIdx === 0;
      document.getElementById('next-btn').textContent = currentIdx === activeQuestions.length - 1 ? "В меню вариантов" : "Далее →";
    }

    document.getElementById('play-btn').onclick = () => {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(activeQuestions[currentIdx].tts); u.lang = 'ko-KR'; u.rate = 0.85;
      window.speechSynthesis.speak(u);
    };

    document.getElementById('next-btn').onclick = () => {
      if (currentIdx < activeQuestions.length - 1) { currentIdx++; render(); } 
      else { 
        alert("Тестирование завершено!"); 
        location.reload();
      }
    };
    document.getElementById('prev-btn').onclick = () => { if (currentIdx > 0) { currentIdx--; render(); } };
  </script>
