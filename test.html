<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ИИ-Аналитика результатов · TOPIK ILS</title>
  <style>
    :root {
      --bg: #05070f;
      --card-bg: rgba(13, 18, 33, 0.45);
      --border: rgba(168, 85, 247, 0.2);
      --text: #f3f4f6;
      --text-muted: #8892b0;
      --purple: #a855f7;
      --cyan: #06b6d4;
      --success: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.25s ease; }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      padding: 50px 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }

    .result-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      backdrop-filter: blur(15px);
      box-shadow: 0 20px 50px rgba(168, 85, 247, 0.05);
    }

    h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #fff, var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 25px;
      text-align: center;
    }

    .score-board {
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: rgba(255,255,255,0.02);
      border-radius: 16px;
      padding: 25px;
      margin-bottom: 35px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .score-item { text-align: center; }
    .score-val { font-size: 2.5rem; font-weight: 850; color: #fff; }
    .score-val.highlight { color: var(--cyan); text-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }
    .score-lbl { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; margin-top: 5px; }

    /* Блок ИИ Фидбека */
    .ai-feedback-box {
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.1), rgba(6, 182, 212, 0.05));
      border: 1px solid var(--purple);
      border-radius: 16px;
      padding: 25px;
      margin-bottom: 35px;
      position: relative;
    }
    .ai-feedback-box::before {
      content: '🤖 AI INSIGHT';
      position: absolute;
      top: -12px; left: 20px;
      background: var(--purple);
      color: #fff; font-size: 0.7rem; font-weight: 800;
      padding: 3px 10px; border-radius: 6px; letter-spacing: 1px;
    }
    .ai-text { font-size: 1.05rem; line-height: 1.6; color: #e2e8f0; }

    .btn-home {
      display: block; text-align: center; background: transparent;
      border: 1px solid rgba(255,255,255,0.15); color: #fff;
      padding: 14px; border-radius: 12px; font-weight: 600; text-decoration: none;
    }
    .btn-home:hover { background: #fff; color: #000; }
  </style>
</head>
<body>

  <div class="container">
    <div class="result-card">
      <h1>Анализ Экзаменационной Сессии</h1>

      <div class="score-board">
        <div class="score-item">
          <div class="score-val" id="correct-ratio">0/0</div>
          <div class="score-lbl">Правильные ответы</div>
        </div>
        <div class="score-item">
          <div class="score-val highlight" id="calculated-score">0</div>
          <div class="score-lbl">Эквивалент TOPIK (Баллы)</div>
        </div>
        <div class="score-item">
          <div class="score-val" id="grade-level">—</div>
          <div class="score-lbl">Присвоенный уровень</div>
        </div>
      </div>

      <div class="ai-feedback-box">
        <p class="ai-text" id="ai-comment">Генерирую экспертный отзыв ИИ...</p>
      </div>

      <a href="index.html" class="btn-home">Вернуться на главную панель</a>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Извлекаем данные из хранилища сессии
      const rawData = sessionStorage.getItem('topik_last_results');
      if (!rawData) {
        document.getElementById('ai-comment').textContent = "Данные теста не найдены. Пожалуйста, пройдите тест заново.";
        return;
      }

      const report = JSON.parse(rawData);
      const isTopik2 = report.examKey.includes('topik2');
      
      // Вычисляем процент успеха
      const percent = report.correctCount / report.totalQuestions;
      
      // Адаптируем под реальную 300-балльную систему TOPIK II (или 200-балльную для TOPIK I)
      const maxScale = isTopik2 ? 300 : 200;
      const finalScore = Math.round(percent * maxScale);

      // Рассчитываем Гып (Уровень) по официальной шкале NIIED
      let grade = "❌ Не сдан";
      if (isTopik2) {
        if (finalScore >= 230) grade = "6 급 (Высший)";
        else if (finalScore >= 190) grade = "5 급 (Продвинутый)";
        else if (finalScore >= 150) grade = "4 급 (Средний)";
        else if (finalScore >= 120) grade = "3 급 (Порог Профессионального)";
      } else {
        if (finalScore >= 140) grade = "2 급 (Базовый)";
        else if (finalScore >= 80) grade = "1 급 (Элементарный)";
      }

      // Выводим сухие цифры
      document.getElementById('correct-ratio').textContent = `${report.correctCount} / ${report.totalQuestions}`;
      document.getElementById('calculated-score').textContent = `${finalScore} / ${maxScale}`;
      document.getElementById('grade-level').textContent = grade;

      // ГЕНЕРАЦИЯ ЖИВОГО ИИ-ФИДБЕКА
      const aiTextEl = document.getElementById('ai-comment');
      
      if (isTopik2 && finalScore === 120) {
        aiTextEl.innerHTML = `🌟 <strong>Феноменально! ИИ зафиксировал аномалию!</strong> Ты набрал ровно 120 баллов на TOPIK II — а это железобетонный <strong>3 Гып</strong> (первая ступень среднего уровня)! <br><br>Если ты сделал это без знания корейской графики, то твоя интуиция развита на уровне топ-менеджеров блокчейн-платформ, либо корейские боги иммиграции лично благословили твои клики. Для честного подтверждения этого результата рекомендую изучить структуру грамматик <em>-다시피</em> и потренировать 쓰기 (письмо), чтобы превратить эту удачу в академическое превосходство!`;
      } else if (percent === 1) {
        aiTextEl.innerHTML = `🎯 <strong>Абсолютная доминация!</strong> Результат 100%. Вы либо носитель языка из Сеула, либо гениально взломали систему ответов. ИИ рекомендует подавать документы на грант KGSP!`;
      } else if (percent >= 0.6) {
        aiTextEl.innerHTML = `📈 <strong>Отличный академический показатель.</strong> Вы уверенно ориентируетесь в контексте и структуре предложений. Ошибки носят единичный характер. Продолжайте в том же темпе!`;
      } else if (percent > 0) {
        aiTextEl.innerHTML = `🧐 <strong>Уровень требует калибровки.</strong> Базовые маркеры понятны, но не хватает лексического запаса. Для TOPIK II критически важно отличать схожие суффиксы и союзы.`;
      } else {
        aiTextEl.innerHTML = `🪵 <strong>0 баллов. Полный блэкаут.</strong> Ни один ответ не совпал. Но эй, отрицательный результат в кибер-тестировании — это тоже точка старта. Время открыть корейский алфавит (Хангыль) и начать заново!`;
      }
    });
  </script>
</body>
</html>
