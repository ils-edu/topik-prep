<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Официальный симулятор TOPIK · ILS Ultimate</title>
  <style>
    :root {
      --bg: #05070f;
      --card-bg: rgba(13, 18, 33, 0.65);
      --border: rgba(168, 85, 247, 0.2);
      --text: #f3f4f6;
      --text-muted: #8892b0;
      --purple: #a855f7;
      --cyan: #06b6d4;
      --success: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.2s ease; }
    body { background-color: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; padding: 40px 20px; }
    .container { max-width: 850px; margin: 0 auto; }

    .test-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 40px; backdrop-filter: blur(20px); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    
    .test-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .timer-badge { background: rgba(6, 182, 212, 0.1); border: 1px solid var(--cyan); color: var(--cyan); padding: 6px 14px; border-radius: 8px; font-weight: 700; font-variant-numeric: tabular-nums; }
    
    .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--cyan)); width: 0%; }
    
    .q-meta { font-size: 0.85rem; color: var(--purple); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .q-text { font-size: 1.25rem; font-weight: 700; margin-bottom: 30px; line-height: 1.6; color: #fff; white-space: pre-line; }

    .options-group { display: grid; grid-template-columns: 1fr; gap: 14px; }
    .option-btn {
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px;
      padding: 18px 22px; text-align: left; color: var(--text); font-size: 1.05rem; font-weight: 600; cursor: pointer;
    }
    .option-btn:hover { background: rgba(168, 85, 247, 0.08); border-color: rgba(168, 85, 247, 0.4); }
    .option-btn:disabled { cursor: not-allowed; opacity: 0.5; }

    .essay-area {
      width: 100%; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px;
      padding: 18px; color: #fff; font-size: 1.1rem; font-family: inherit; margin-bottom: 15px; resize: vertical;
    }
    .essay-area:focus { border-color: var(--cyan); outline: none; }
    .char-counter { font-size: 0.85rem; color: var(--text-muted); text-align: right; margin-bottom: 20px; }

    .action-btn {
      background: linear-gradient(135deg, var(--purple), #7c3aed); color: #fff; border: none;
      padding: 15px 35px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1rem;
    }
    .action-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  </style>
</head>
<body>

  <main class="container">
    <div class="test-card">
      <div class="test-header">
        <div class="q-meta" id="exam-title">Загрузка ядра генерации...</div>
        <div class="timer-badge" id="timer">00:00</div>
      </div>
      
      <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
      <div class="q-meta" id="q-number">Задание 1</div>
      <div class="q-text" id="q-text">Пожалуйста, подождите...</div>
      
      <div id="interaction-zone"></div>
    </div>
  </main>

  <script>
    (() => {
      'use strict';

      const urlParams = new URLSearchParams(window.location.search);
      const examKey = urlParams.get('exam') || 'topik1-v1';
      const variantNum = parseInt(examKey.slice(-1)) || 1;
      const isTopik2 = examKey.includes('topik2');

      // Псевдослучайный генератор (Seedable PRNG), чтобы варианты не пересекались
      function SeededRandom(seed) {
        return function() {
          let t = seed += 0x6D2B79F5;
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        }
      }
      // У каждого варианта свое уникальное начальное зерно для генерации
      const rnd = SeededRandom(isTopik2 ? variantNum * 2000 : variantNum * 1000);

      // Языковые матрицы TOPIK I (Начальный уровень)
      const topik1Lexicon = {
        subjects: ['동생이', '어머니가', '친구가', '선생님이', '형이', '아버지가', '누나가', '의사가'],
        actions: ['공부합니다', '운동을 합니다', '책을 읽습니다', '노래를 부릅니다', '커피를 마십니다', '한국어를 배웁니다', '잠을 잡니다', '음식을 만듭니다'],
        places: ['시장에 갑니다', '백화점에 갑니다', '학교에 갑니다', '공원에 갑니다', '도서관에 갑니다', '식당에 갑니다', '은행에 갑니다', '병원에 갑니다'],
        distractors: ['날씨', '날짜', '시간', '과일', '가방', '가족', '휴일', '이름', '취미', '쇼핑', '공부', '직업', '나이', '주소', '가격', '교통']
      };

      // Языковые матрицы TOPIK II (Средний / Продвинутый уровень)
      const topik2Lexicon = {
        contexts: [
          '정부가 고용 시장의 안정을 위해 새로운 대책을 발표했음에도 불구하고 경제 지표는 여전히',
          '현대 사회에서 인공지능 기술이 급격히 발전함에 따라 인간 고유의 창의적 능력이 더욱',
          '환경 오염 문제를 해결하기 위해 일회용품 사용을 규제하는 법안이 시행된 이후 대중들의 인식이',
          '고령화 사회가 심화되면서 노인 복지 예산을 확보하려는 국가적 차원의 움직임이 활발히',
          '소비자들의 구매 패턴이 오프라인에서 온라인 플랫폼으로 이동하면서 유통 구조의 혁신이',
          '전통문화의 가치를 보존하고 이를 현대적으로 재해석하려는 예술가들의 노력이 끊임없이',
          '아동기 교육 환경이 인격 형성에 미치는 영향에 대한 연구 결과가 발표되면서 학부모들의 관심이',
          '다문화 가정이 증가함에 따라 사회적 통합을 유도하기 위한 정책적 인프라 구축이 시급히'
        ],
        grammarOptions: [
          ['오를 대로 오른', '오를 세라', '오를 듯한', '오를 대로 오르는'],
          ['줄어들 기세를', '줄어들다시피', '줄어들 대가', '줄어드는 대신에'],
          ['감안하더라도', '감안할 정도로', '감안하기 마련이라', '감안하는 척하면서'],
          ['배제할 수 없는', '배제하는 바람에', '배제하는 토대', '배제할 지경이다'],
          ['주목받기 시작했다', '주목받을 리가 없다', '주목받는 셈이다', '주목받도록 했다'],
          ['이루어지고 있다', '이루어질 턱이 없다', '이루어질 뿐이다', '이루어지기 십상이다'],
          ['집중되는 추세이다', '집중될 리 만무하다', '집중될 따름이다', '집중되도록 하였다'],
          ['요구되는 시점이다', '요구될 수밖에 없다', '요구될 지도 모른다', '요구되곤 했다']
        ]
      };

      // Перемешивание массивов
      function shuffleArray(arr) {
        let array = [...arr];
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(rnd() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }

      // Генератор TOPIK I (70 уникальных тестов)
      function makeTopik1() {
        let list = [];
        for (let i = 1; i <= 70; i++) {
          const sect = i <= 30 ? '듣기 (Слушание)' : '읽기 (Чтение)';
          const sub = topik1Lexicon.subjects[Math.floor(rnd() * topik1Lexicon.subjects.length)];
          const act = topik1Lexicon.actions[Math.floor(rnd() * topik1Lexicon.actions.length)];
          const plc = topik1Lexicon.places[Math.floor(rnd() * topik1Lexicon.places.length)];
          
          let rawOpts = shuffleArray(topik1Lexicon.distractors).slice(0, 4);
          const ansIdx = Math.floor(rnd() * 4);
          
          let text = `[${sect} 제 ${i} 항] 무엇에 대한 이야기입니까?\n"${sub} ${act}. 그리고 ${plc}."`;
          if (i > 50) {
            text = `[${sect} 제 ${i} 항] 빈칸에 들어갈 알맞은 것을 고르십시오.\n"저는 내일 친구를 만납니다. 우리 영화를 ( )."`;
            rawOpts = ['① 봅니다', '② 먹습니다', '③ 잡니다', '④ 가르칩니다'];
          }

          list.push({
            type: 'choice',
            section: sect,
            text: text,
            options: rawOpts.map((o, idx) => `${idx + 1}. ${o}`),
            answer: ansIdx + 1
          });
        }
        return list;
      }

      // Генератор TOPIK II (100 уникальных тестов + 4 Письма)
      function makeTopik2() {
        let list = [];
        
        // 1. Секция Слушания (듣기) — 50 вопросов
        for (let i = 1; i <= 50; i++) {
          const ctxIdx = (i + variantNum) % topik2Lexicon.contexts.length;
          const opts = topik2Lexicon.grammarOptions[ctxIdx];
          list.push({
            type: 'choice',
            section: '듣기 (Слушание)',
            text: `[듣기 제 ${i} 항] 다음 대화를 듣고 이어질 수 있는 말로 알맞은 것을 고르십시오.\n"${topik2Lexicon.contexts[ctxIdx]} ( )."`,
            options: opts.map((o, idx) => `${idx + 1}. ${o}`),
            answer: ((i + variantNum) % 4) + 1
          });
        }

        // 2. Секция Письма (쓰기) — 4 бланка
        const writingPrompts = [
          { q: '51', txt: `"유미 씨, 전시회 초대에 감사드립니다. 원래는 참석하려고 했으나 갑작스러운 출장 일정이 [ ㄱ ]. 다음 주에 귀국하는 대로 다시 [ ㄴ ]."`, s: '생겼습니다' },
          { q: '52', txt: `"독서는 정서적 안정에 큰 가치를 지닌다. 책을 읽는 과정에서 뇌는 휴식을 [ ㄱ ]. 반면, 스마트폰을 보는 행위는 오히려 스트레스를 [ ㄴ ]."`, s: '취하게 된다' },
          { q: '53', txt: `[쓰기 제 53 항] 다음 그래프를 분석하여 설명문을 작성하십시오 (200~300자).\n\n• 조사 기관: 한국경제연구소\n• 주제: 20-30대 1인 가구 소비 트렌드 변화\n• 주요 요인: 편리함 추구 및 소형 가전 시장 확대`, s: '그래프분석' },
          { q: '54', txt: `[쓰기 제 54 항] '현대 사회의 정보 과잉 현상'에 대하여 자신의 견해를 서술하십시오 (600~700자).\n\n1. 정보 과잉이 현대인에게 미치는 심리적 부작용은 무엇인가?\n2. 올바른 정보를 판별하기 위해 필요한 개인적 노력은 무엇인가?\n3. 정부 및 플랫폼 기업은 어떤 제도적 장치를 마련해야 하는가?`, s: '에세이작성' }
        ];

        writingPrompts.forEach(wp => {
          list.push({
            type: 'write',
            section: `쓰기 (Письмо) — Q${wp.q}`,
            text: wp.txt,
            sample: wp.s
          });
        });

        // 3. Секция Чтения (읽기) — 50 вопросов
        for (let i = 55; i <= 104; i++) {
          const ctxIdx = (i + variantNum + 3) % topik2Lexicon.contexts.length;
          const opts = topik2Lexicon.grammarOptions[ctxIdx];
          list.push({
            type: 'choice',
            section: '읽기 (Чтение)',
            text: `[읽기 제 ${i - 4} 항] 다음 글을 읽고 빈칸에 들어갈 가장 알맞은 표현을 고르십시오.\n"${topik2Lexicon.contexts[ctxIdx]} ( )."`,
            options: opts.map((o, idx) => `${idx + 1}. ${o}`),
            answer: ((i + 2) % 4) + 1
          });
        }

        return list;
      }

      // Инициализация структуры
      const questions = Object.freeze(isTopik2 ? makeTopik2() : makeTopik1());
      let currentIdx = 0;
      const userAnswers = new Array(questions.length).fill(null);
      let timeLeft = isTopik2 ? 180 * 60 : 100 * 60;

      function startTimer() {
        const timerEl = document.getElementById('timer');
        const interval = setInterval(() => {
          if (timeLeft <= 0) {
            clearInterval(interval);
            finishExam();
            return;
          }
          timeLeft--;
          const mins = Math.floor(timeLeft / 60);
          const secs = timeLeft % 60;
          timerEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }, 1000);
      }

      function renderQuestion() {
        if (currentIdx >= questions.length) {
          finishExam();
          return;
        }

        const q = questions[currentIdx];
        
        document.getElementById('progress').style.width = `${(currentIdx / questions.length) * 100}%`;
        document.getElementById('exam-title').textContent = `${examKey.toUpperCase()} • Секция: ${q.section}`;
        document.getElementById('q-number').textContent = `Задание ${currentIdx + 1} из ${questions.length}`;
        document.getElementById('q-text').textContent = q.text;

        const zone = document.getElementById('interaction-zone');
        zone.innerHTML = '';

        if (q.type === 'choice') {
          const wrapper = document.createElement('div');
          wrapper.className = 'options-group';
          
          q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.onclick = () => saveChoiceAnswer(index + 1);
            wrapper.appendChild(btn);
          });
          
          zone.appendChild(wrapper);

        } else if (q.type === 'write') {
          const textarea = document.createElement('textarea');
          textarea.className = 'essay-area';
          textarea.rows = q.section.includes('Q54') ? 10 : 4;
          textarea.placeholder = '작성하십시오 (Пишите строго на корейском языке)...';
          textarea.id = 'essay-field';

          const counter = document.createElement('div');
          counter.className = 'char-counter';
          counter.textContent = 'Знаков: 0';
          
          textarea.oninput = (e) => {
            counter.textContent = `Знаков: ${e.target.value.length}`;
          };

          const submitBtn = document.createElement('button');
          submitBtn.className = 'action-btn';
          submitBtn.textContent = 'Сдать бланк задания и перейти далее';
          submitBtn.onclick = () => saveWriteAnswer();

          zone.appendChild(textarea);
          zone.appendChild(counter);
          zone.appendChild(submitBtn);
        }
      }

      function saveChoiceAnswer(selectedOption) {
        userAnswers[currentIdx] = selectedOption;
        currentIdx++;
        renderQuestion();
      }

      function saveWriteAnswer() {
        const field = document.getElementById('essay-field');
        if (!field) return;

        const val = field.value.trim();
        if (!val) {
          alert('Пустой бланк не принимается.');
          return;
        }

        userAnswers[currentIdx] = val;
        currentIdx++;
        renderQuestion();
      }

      function finishExam() {
        let correctCount = 0;

        questions.forEach((q, idx) => {
          const uAns = userAnswers[idx];
          if (q.type === 'choice') {
            if (Number(uAns) === Number(q.answer)) correctCount++;
          } else if (q.type === 'write') {
            if (String(uAns).length > 5) correctCount++;
          }
        });

        const resultsPayload = {
          examKey: examKey,
          totalQuestions: questions.length,
          correctCount: correctCount,
          questions: questions.map(q => ({ type: q.type, text: q.text })),
          userAnswers: userAnswers
        };

        sessionStorage.setItem('topik_last_results', JSON.stringify(resultsPayload));
        window.location.href = 'results.html';
      }

      document.addEventListener('DOMContentLoaded', () => {
        startTimer();
        renderQuestion();
      });
    })();
  </script>
</body>
</html>
