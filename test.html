<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Симулятор TOPIK · Официальный пул заданий</title>
  <style>
    :root {
      --bg: #05050a;
      --card-bg: rgba(13, 13, 25, 0.7);
      --border: rgba(168, 85, 247, 0.15);
      --text: #f3f4f6;
      --text-muted: #71717a;
      --purple: #a855f7;
      --purple-glow: rgba(168, 85, 247, 0.25);
      --cyan: #06b6d4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.2s ease; }
    body { background-color: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; padding: 40px 20px; }
    .container { max-width: 750px; margin: 0 auto; }

    .test-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--cyan)); width: 0%; }
    
    .q-meta { font-size: 0.85rem; color: var(--cyan); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .q-text { font-size: 1.3rem; font-weight: 700; margin-bottom: 30px; line-height: 1.5; color: #fff; white-space: pre-line; }

    /* Варианты ответов */
    .options-group { display: flex; flex-direction: column; gap: 14px; }
    .option-btn {
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px;
      padding: 16px 20px; text-align: left; color: var(--text); font-size: 1.05rem; font-weight: 600; cursor: pointer;
    }
    .option-btn:hover { background: rgba(168, 85, 247, 0.08); border-color: rgba(168, 85, 247, 0.3); }
    .option-btn:disabled { cursor: not-allowed; opacity: 0.6; }

    /* Письменная часть */
    .write-input {
      width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px;
      padding: 16px; color: #fff; font-size: 1.1rem; font-family: inherit; margin-bottom: 20px; resize: none;
    }
    .write-input:focus { border-color: var(--purple); outline: none; }
    .write-input:disabled { opacity: 0.6; cursor: not-allowed; }

    .action-btn {
      background: linear-gradient(135deg, var(--purple), #7c3aed); color: #fff; border: none;
      padding: 14px 32px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1rem;
    }
    .action-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <main class="container">
    <div class="test-card">
      <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
      <div class="q-meta" id="q-meta">Загрузка структуры...</div>
      <div class="q-text" id="q-text">Пожалуйста, подождите...</div>
      
      <div id="interaction-zone"></div>
    </div>
  </main>

  <script>
    (() => {
      'use strict';

      const urlParams = new URLSearchParams(window.location.search);
      const examKey = urlParams.get('exam') || 'topik1-v1';

      // ЧЕТКАЯ ОФИЦИАЛЬНАЯ СТРУКТУРА ТЕСТОВ (БЕЗ РАНДОМА)
      const examRepository = {
        
        // --- ПОЛНОЦЕННЫЙ ЭКЗАМЕН TOPIK I (읽기 - Чтение) ---
        'topik1': [
          {
            type: 'choice',
            text: '[TOPIK I - Лексика] 다음은 무엇에 대한 이야기입니까?\n"우유를 마십니다. 맛있습니다."',
            options: ['① 음식 (Еда/Напитки)', '② 나이 (Возраст)', '③ 날짜 (Дата)', '④ 이름 (Имя)'],
            answer: 1
          },
          {
            type: 'choice',
            text: '[TOPIK I - Грамматические маркеры] 빈칸에 들어갈 알맞은 조사를 고르십시오.\n"오늘 아침 ( ) 빵과 사과를 먹었습니다."',
            options: ['① 에', '② 가', '③ 를', '④ 에서'],
            answer: 1
          },
          {
            type: 'choice',
            text: '[TOPIK I - Анализ объявлений] 다음은 무엇에 대한 안내문입니까?\n"이용 시간: 09:00 ~ 18:00 / 매주 월요일은 쉽니다."',
            options: ['① 가격 (Цена)', '② 취미 (Хобби)', '③ 휴일 (Выходной)', '④ 주소 (Адрес)'],
            answer: 3
          },
          {
            type: 'choice',
            text: '[TOPIK I - Контекстный глагол] 빈칸에 들어갈 가장 알맞은 것을 고르십시오.\n"방이 너무 ( ). 불을 켭니다."',
            options: ['① 좁습니다', '② 어둡습니다 (Темно)', '③ 가깝습니다', '④ 조용합니다'],
            answer: 2
          },
          {
            type: 'choice',
            text: '[TOPIK I - Поиск логики] 문맥에 알맞은 окончание 고르십시오.\n"내일은 친구 생일입니다. 그래서 오늘 선물을 ( )."',
            options: ['① 샀습니다', '② 샀겠군요', '③ 사려고 합니다 (Собираюсь купить)', '④ 사지 않았습니다'],
            answer: 3
          }
        ],

        // --- ПОЛНОЦЕННЫЙ ЭКЗАМЕН TOPIK II (읽기 Тесты + 쓰기 Письмо) ---
        'topik2': [
          {
            type: 'choice',
            text: '[TOPIK II - Продвинутая грамматика] ( )에 들어갈 가장 알맞은 것을 고르십시오.\n"공장을 다녀 본 ( ) 이 일은 그리 어렵지 않았다."',
            options: ['① 탓에', '② 셈 치고', '③ 바에야', '④ 경험을 바탕으로 (На основе опыта)'],
            answer: 4
          },
          {
            type: 'choice',
            text: '[TOPIK II - Грамматика выбора] ( )에 들어갈 알맞은 것을 고르십시오.\n"무슨 일을 ( ) 열심히 하는 모습이 보기 좋다."',
            options: ['① 하든지 (Что бы ни делал)', '② 하도록', '③ 하다 보면', '④ 하느라고'],
            answer: 1
          },
          {
            type: 'choice',
            text: '[TOPIK II - Логическое построение] 다음을 순서대로 알맞게 배열한 것을 고르십시오.\n\n(가) 지갑을 잃어버렸다.\n(나) 경찰서에 가서 신고를 했다.\n(다) 다행히 친절한 사람이 지갑을 찾아 주었다.',
            options: ['① (가)-(나)-(다)', '② (나)-(가)-(다)', '③ (다)-(가)-(나)', '④ (가)-(다)-(나)'],
            answer: 1
          },
          {
            type: 'write',
            text: '[TOPIK II - Письмо 쓰기 Задание №51]\nТекстуальный пропуск. Впишите строго одну фразу вместо [ ㄱ ]:\n\n"유미 씨, 그동안 고마웠습니다. 다음 주에 저는 고향으로 [  ㄱ  ]. 떠나기 전에 얼굴을 보고 싶습니다."',
            sample: '돌아가게 되었습니다'
          },
          {
            type: 'write',
            text: '[TOPIK II - Письмо 쓰기 Задание №52]\nАкадемический пропуск. Впишите строго одну фразу вместо [ ㄴ ]:\n\n"매운맛은 맛이 아니라 통증이다. 그럼에도 매운 음식을 먹으면 뇌가 통증을 줄이기 위해 엔도르핀을 [  ㄴ  ]. 그래서 스트레스가 풀리는 느낌을 받는다."',
            sample: '분비하기 때문이다'
          }
        ]
      };

      // Определяем, какую именно базу загрузить (если в URL есть слово topik2, грузим topik2, иначе topik1)
      const currentType = examKey.toLowerCase().includes('topik2') ? 'topik2' : 'topik1';
      const questions = Object.freeze(examRepository[currentType]);

      let currentIdx = 0;
      const userAnswers = new Array(questions.length).fill(null);

      function renderQuestion() {
        if (currentIdx >= questions.length) {
          finishExam();
          return;
        }

        const q = questions[currentIdx];
        
        document.getElementById('progress').style.width = `${(currentIdx / questions.length) * 100}%`;
        document.getElementById('q-meta').textContent = `Задание ${currentIdx + 1} из ${questions.length} | ${currentType.toUpperCase()}`;
        document.getElementById('q-text').textContent = q.text;

        const zone = document.getElementById('interaction-zone');
        zone.innerHTML = '';

        if (q.type === 'choice') {
          const wrapper = document.createElement('div');
          wrapper.className = 'options-group';
          
          q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.onclick = () => saveChoiceAnswer(index + 1);
            wrapper.appendChild(btn);
          });
          
          zone.appendChild(wrapper);

        } else if (q.type === 'write') {
          const input = document.createElement('textarea');
          input.className = 'write-input';
          input.rows = 3;
          input.placeholder = 'Введите ваш ответ на корейском языке (только пропущенную фразу)...';
          input.id = 'write-field';

          const submitBtn = document.createElement('button');
          submitBtn.className = 'action-btn';
          submitBtn.textContent = 'Зафиксировать ответ и идти далее';
          submitBtn.onclick = () => saveWriteAnswer();

          zone.appendChild(input);
          zone.appendChild(submitBtn);
        }
      }

      function saveChoiceAnswer(selectedOption) {
        disableAllInputs();
        userAnswers[currentIdx] = selectedOption;

        setTimeout(() => {
          currentIdx++;
          renderQuestion();
        }, 300);
      }

      function saveWriteAnswer() {
        const field = document.getElementById('write-field');
        if (!field) return;

        const val = field.value.trim();
        if (!val) {
          alert('Пожалуйста, введите фразу для заполнения пропуска.');
          return;
        }

        disableAllInputs();
        userAnswers[currentIdx] = val;

        currentIdx++;
        renderQuestion();
      }

      function disableAllInputs() {
        document.querySelectorAll('.option-btn, #write-field, .action-btn').forEach(el => {
          el.disabled = true;
        });
      }

      function finishExam() {
        let correctCount = 0;

        questions.forEach((q, idx) => {
          const uAns = userAnswers[idx];
          if (q.type === 'choice') {
            if (Number(uAns) === Number(q.answer)) correctCount++;
          } else if (q.type === 'write') {
            // Мягкая очистка текста от лишних пробелов для проверки ввода
            const cleanUser = String(uAns).replace(/\s+/g, '').toLowerCase();
            const cleanSample = String(q.sample).replace(/\s+/g, '').toLowerCase();
            if (cleanUser === cleanSample) correctCount++;
          }
        });

        const resultsPayload = {
          examKey: currentType,
          totalQuestions: questions.length,
          correctCount: correctCount,
          questions: questions.map(q => ({
            type: q.type,
            text: q.text,
            correctAnswer: q.options ? q.options[q.answer - 1] : null,
            sample: q.sample || null
          })),
          userAnswers: userAnswers.map((u, i) => {
            if (questions[i].type === 'choice') {
              return questions[i].options[u - 1] || 'Нет ответа';
            }
            return u;
          })
        };

        sessionStorage.setItem('topik_last_results', JSON.stringify(resultsPayload));
        window.location.href = 'results.html';
      }

      document.addEventListener('DOMContentLoaded', renderQuestion);
    })();
  </script>
</body>
</html>
