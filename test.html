<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Симулятор TOPIK II · ILS</title>
  <style>
    :root {
      --primary: #a855f7;
      --bg-main: #090d16;
      --bg-card: rgba(17, 24, 39, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent-green: #34d399;
      --accent-red: #f87171;
    }
    body {
      background-color: var(--bg-main);
      background-image: radial-gradient(circle at 50% 0%, rgba(168, 85, 247, 0.08) 0%, transparent 50%);
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--text-main);
      margin: 0; padding: 0;
    }
    .test-header {
      background: rgba(9, 13, 22, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 15px 20px;
    }
    .test-header-inner {
      max-width: 800px; margin: 0 auto;
      display: flex; justify-content: space-between; align-items: center;
    }
    .logo-kor { background: linear-gradient(135deg, #a855f7, #c084fc); color: #0f172a; font-weight: 800; padding: 2px 8px; border-radius: 6px; margin-right: 5px; }
    .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
    .audio-block { background: linear-gradient(135deg, rgba(168, 85, 247, 0.1), rgba(17, 24, 39, 0.6)); border: 1px solid rgba(168, 85, 247, 0.2); border-radius: 16px; padding: 20px; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; }
    .audio-play-btn { background: var(--primary); color: #fff; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; }
    .question-block { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .question-num { background: var(--primary); color: #fff; font-weight: 700; padding: 4px 10px; border-radius: 8px; margin-right: 10px; }
    .answer-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); color: var(--text-main); padding: 16px 20px; border-radius: 12px; width: 100%; text-align: left; font-size: 1.05rem; margin: 10px 0; cursor: pointer; transition: all 0.2s; }
    .answer-btn:hover { border-color: rgba(168, 85, 247, 0.4); background: rgba(168, 85, 247, 0.05); }
    .answer-input { background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border); color: #fff; font-size: 1.2rem; padding: 15px; border-radius: 12px; width: 100%; box-sizing: border-box; margin-top: 15px; }
    .ai-hint { margin-top: 20px; padding: 15px 20px; border-radius: 12px; background: rgba(255, 255, 255, 0.05); border-left: 4px solid var(--primary); }
    .btn { padding: 12px 24px; font-size: 0.95rem; font-weight: 600; border-radius: 10px; cursor: pointer; border: none; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-secondary { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); color: var(--primary); }
    .test-nav { display: flex; justify-content: space-between; margin-top: 25px; }
  </style>
</head>
<body>

  <header class="test-header">
    <div class="test-header-inner">
      <div style="font-weight:800; font-size:1.2rem;"><span class="logo-kor">한국</span>TOPIK.ILS</div>
      <div style="color: var(--text-muted);">Вопрос <span id="current-q">1</span> из <span id="total-q">3</span></div>
    </div>
  </header>

  <main class="container">
    <h2 id="part-title" style="font-size: 1.4rem; margin-bottom: 5px;">Загрузка...</h2>
    <p id="part-desc" style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 25px;"></p>

    <div class="audio-block" id="audio-block" hidden>
      <button type="button" class="audio-play-btn" id="play-btn">▶</button>
      <div>
        <p style="margin:0; font-weight:600;">듣기 (Аудиозапись задания)</p>
        <span style="font-size:0.8rem; color:var(--text-muted);">Осталось прослушиваний: <span id="plays-left">2</span></span>
      </div>
    </div>

    <div class="question-block">
      <div style="margin-bottom: 15px;"><span class="question-num" id="q-badge">1</span><span id="q-instruction" style="color:var(--text-muted);"></span></div>
      <div id="q-text" style="font-size: 1.3rem; font-weight:700; margin: 20px 0;"></div>
      <div id="answers-container"></div>
      
      <div class="ai-hint" id="ai-hint" hidden>
        <p id="ai-hint-text" style="margin:0; font-size:0.95rem;"></p>
      </div>
    </div>

    <div class="test-nav">
      <button class="btn btn-secondary" id="prev-btn" style="color:#fff;">← Назад</button>
      <button class="btn btn-secondary" id="check-btn" hidden>Проверить ответ</button>
      <button class="btn btn-primary" id="next-btn">Далее →</button>
    </div>
  </main>

  <script>

        options: [

          "B) 새로운 시대에 맞는 교육 체계를 구축해야 한다 (Необходимо создать систему образования новой эпохи)",
          "C) 전통적인 제조업 일자리를 무조건 보호해야 한다 (Нужно защищать рабочие места)"
        ],

        desc: "Прочитайте текст и выберите подходящее устойчивое выражение (са
