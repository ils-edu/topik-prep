<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Симулятор TOPIK · Официальный пул заданий</title>
  <style>
    :root {
      --bg: #05050a;
      --card-bg: rgba(13, 13, 25, 0.7);
      --border: rgba(168, 85, 247, 0.15);
      --text: #f3f4f6;
      --text-muted: #71717a;
      --purple: #a855f7;
      --purple-glow: rgba(168, 85, 247, 0.25);
      --cyan: #06b6d4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.2s ease; }
    body { background-color: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; padding: 40px 20px; }
    .container { max-width: 750px; margin: 0 auto; }

    .test-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--cyan)); width: 0%; }
    
    .q-meta { font-size: 0.85rem; color: var(--cyan); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .q-text { font-size: 1.3rem; font-weight: 700; margin-bottom: 30px; line-height: 1.5; color: #fff; white-space: pre-line; }

    /* Варианты ответов */
    .options-group { display: flex; flex-direction: column; gap: 14px; }
    .option-btn {
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px;
      padding: 16px 20px; text-align: left; color: var(--text); font-size: 1.05rem; font-weight: 600; cursor: pointer;
    }
    .option-btn:hover { background: rgba(168, 85, 247, 0.08); border-color: rgba(168, 85, 247, 0.3); }
    .option-btn:disabled { cursor: not-allowed; opacity: 0.6; }

    /* Письменная часть */
    .write-input {
      width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px;
      padding: 16px; color: #fff; font-size: 1.1rem; font-family: inherit; margin-bottom: 20px; resize: none;
    }
    .write-input:focus { border-color: var(--purple); outline: none; }
    .write-input:disabled { opacity: 0.6; cursor: not-allowed; }

    .action-btn {
      background: linear-gradient(135deg, var(--purple), #7c3aed); color: #fff; border: none;
      padding: 14px 32px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1rem;
    }
    .action-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <main class="container">
    <div class="test-card">
      <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
      <div class="q-meta" id="q-meta">Загрузка структуры...</div>
      <div class="q-text" id="q-text">Пожалуйста, подождите...</div>
      
      <div id="interaction-zone"></div>
    </div>
  </main>

  <script>
    (() => {
      'use strict';

      const urlParams = new URLSearchParams(window.location.search);
      // Извлекаем точный ключ (например: topik1-v3)
      const examKey = urlParams.get('exam') || 'topik1-v1';

      // ЧЕТКАЯ СТРУКТУРИРОВАННАЯ БАЗА ДАННЫХ ПОД КАЖДЫЙ ВАРИАНТ
      const examRepository = {
        
        // ==========================================
        // 📑 ТОПИК 1 (ВАРИАНТЫ 1-5) — ТОЛЬКО ТЕСТЫ
        // ==========================================
        'topik1-v1': [
          { type: 'choice', text: '64th TOPIK I — Q1. 무엇에 대한 이야기입니까?\n"우유를 마십니다. 맛있습니다."', options: ['① 음식 (Еда/Напитки)', '② 나이 (Возраст)', '③ 날짜 (Дата)', '④ 이름 (Имя)'], answer: 1 },
          { type: 'choice', text: '64th TOPIK I — Q3. 빈칸에 들어갈 알맞은 표현을 고르십시오.\n"시장에 갑니다. 과일을 ( )."', options: ['① 멉니다', '② 삽니다 (Покупаю)', '③ 아픕니다', '④ 모릅니다'], answer: 2 },
          { type: 'choice', text: '60th TOPIK I — Q9. 다음은 무엇에 대한 안내문입니까?\n"이용 시간: 09:00 ~ 18:00 / 매주 월요일은 쉽니다."', options: ['① 가격', '② 취미', '③ 휴일 (Выходной)', '④ 주소'], answer: 3 }
        ],
        'topik1-v2': [
          { type: 'choice', text: '60th TOPIK I — Q2. 무엇에 대한 이야기입니까?\n"동생이 있습니다. 아주 귀엽습니다."', options: ['① 가족 (Семья)', '② 직업 (Профессия)', '③ 주말', '④ 날씨'], answer: 1 },
          { type: 'choice', text: '64th TOPIK I — Q5. 빈칸에 들어갈 가장 알맞은 것을 고르십시오.\n"방이 너무 ( ). 불을 켭니다."', options: ['① 좁습니다', '② 어둡습니다 (Темно)', '③ 가깝습니다', '④ 조용합니다'], answer: 2 },
          { type: 'choice', text: '83rd TOPIK I — Q10. 다음 단어들이 포함된 범주를 고르십시오.\n"피아노 치기, 영화 보기, 축구하기."', options: ['① 쇼핑', '② 계획', '③ 약속', '④ 취미 (Хобби)'], answer: 4 }
        ],
        'topik1-v3': [
          { type: 'choice', text: '64th TOPIK I — Q2. 무엇에 대한 이야기입니까?\n"저는 스물두 살입니다. 대학생입니다."', options: ['① 나라', '② 이름', '③ 나이 (Возраст)', '④ 가방'], answer: 3 },
          { type: 'choice', text: '60th TOPIK I — Q6. 빈칸에 들어갈 표현을 고르십시오.\n"은행에 갑니다. 돈을 ( )."', options: ['① 바꿉니다 (Меняю/Снимаю)', '② 입습니다', '③ 가르칩니다', '④ 전화합니다'], answer: 1 },
          { type: 'choice', text: '92nd TOPIK I — Q11. 다음 문장은 무엇에 대한 정보입니까?\n"서울시 종로구 인사동길 12"', options: ['① 이름', '② 주소 (Адрес)', '③ 날짜', '④ 직업'], answer: 2 }
        ],
        'topik1-v4': [
          { type: 'choice', text: '83rd TOPIK I — Q1. 무엇에 대한 이야기입니까?\n"한국어 공부가 재미있습니다. 매일 학원에 갑니다."', options: ['① 공부 (Учеба)', '② 계절', '③ 휴일', '④ 요일'], answer: 1 },
          { type: 'choice', text: '92nd TOPIK I — Q4. 빈칸에 들어갈 알맞은 단어를 고르십시오.\n"머리가 ( ). 약을 먹었습니다."', options: ['① 맑습니다', '② 좋습니다', '③ 아픕니다 (Болит)', '④ 작습니다'], answer: 3 },
          { type: 'choice', text: '64th TOPIK I — Q12. 다음 안내판의 지시와 일치하는 문장을 고르십시오.\n"여기는 주차장입니다. 차를 세우십시오."', options: ['① 물건을 사는 곳', '② 차를 세우는 곳 (Парковка)', '③ 음식을 먹는 곳', '④ 차를 고치는 곳'], answer: 2 }
        ],
        'topik1-v5': [
          { type: 'choice', text: '92nd TOPIK I — Q3. 무엇에 대한 이야기입니까?\n"백화점에 갑니다. 옷을 삽니다."', options: ['① 날짜', '② 쇼핑 (Шопинг)', '③ 친구', '④ 취미'], answer: 2 },
          { type: 'choice', text: '83rd TOPIK I — Q7. 문맥상 빈칸에 알맞은 표현을 고르십시오.\n"약속 시간이 지났습니다. 친구가 아직 안 ( )."', options: ['① 옵니다 (Не приходит)', '② 갑니다', '③ 만납니다', '④ 전화합니다'], answer: 1 },
          { type: 'choice', text: '60th TOPIK I — Q14. 다음은 무엇에 대한 안내문입니까?\n"1층: 식당 / 2층: 서점 / 3층: 옷가게"', options: ['① 이용 방법', '② 층별 안내 (Информация по этажам)', '③ 영업 시간', '④ 위치 안내'], answer: 2 }
        ],

        // ==========================================
        // 📑 ТОПИК 2 (ВАРИАНТЫ 1-5) — ТЕСТЫ + ПИСЬМО
        // ==========================================
        'topik2-v1': [
          { type: 'choice', text: '[TOPIK II] Q1. ( )에 들어갈 가장 알맞은 것을 고르십시오.\n"공장을 다녀 본 ( ) 이 일은 그리 어렵지 않았다."', options: ['① 탓에', '② 셈 치고', '③ 바에야', '④ 적으로써 (На основе опыта)'], answer: 4 },
          { type: 'write', text: '[TOPIK II] Q51 (Writing). Заполните текстовый пропуск [ㄱ]:\n\n"유미 씨, 그동안 고마웠습니다. 다음 주에 저는 고향으로 [ ㄱ ]. 떠나기 전에 얼굴을 보고 싶습니다."', sample: '돌아가게 되었습니다' }
        ],
        'topik2-v2': [
          { type: 'choice', text: '[TOPIK II] Q1. ( )에 들어갈 가장 알맞은 것을 고르십시오.\n"무슨 일을 ( ) 열심히 하는 모습이 보기 좋다."', options: ['① 하든지 (Что бы ни делал)', '② 하도록', '③ 하다 보면', '④ 하느라고'], answer: 1 },
          { type: 'write', text: '[TOPIK II] Q51 (Writing). Заполните текстовый пропуск [ㄱ]:\n\n"백화점 고객센터입니다. 문의하신 상품은 현재 재고가 부족하여 바로 [ ㄱ ]. 다음 주 월요일까지 배송해 드리겠습니다."', sample: '보내드리기 어렵습니다' }
        ],
        'topik2-v3': [
          { type: 'choice', text: '[TOPIK II] Q2. ( )에 들어갈 가장 알맞은 것을 고르십시오.\n"자녀는 부모의 행동을 ( ) 성장한다."', options: ['① 따라 하면서 (Копируя)', '② 따르다 보면', '③ 따르기 마련이라', '④ 따르는 척하면서'], answer: 1 },
          { type: 'write', text: '[TOPIK II] Q51 (Writing). Заполните текстовый пропуск [ㄱ]:\n\n"한국어 말하기 대회에 참가하고 싶습니다. 신청 마감일이 내일까지인데 혹시 이메일로도 신청서를 [ ㄱ ]?"', sample: '제출해도 됩니까' }
        ],
        'topik2-v4': [
          { type: 'choice', text: '[TOPIK II] Q1. ( )에 들어갈 가장 알맞은 것을 고르십시오.\n"시험을 앞두고 잠을 ( ) 공부했더니 몸이 아주 피곤하다."', options: ['① 줄여 가며 (Урезая)', '② 줄이다시피', '③ 줄이는 대신에', '④ 줄일 정도로'], answer: 1 },
          { type: 'write', text: '[TOPIK II] Q51 (Writing). Заполните текстовый пропуск [ㄱ]:\n\n"도서관장 마이클입니다. 지난달 대출하신 도서의 반납 예정일이 지났습니다. 이번 주말까지 도서를 [ ㄱ ] 주시면 연체료가 면제됩니다."', sample: '반납해' }
        ],
        'topik2-v5': [
          { type: 'choice', text: '[TOPIK II] Q2. ( )에 들어갈 가장 알맞은 것을 고르십시오.\n"정부가 대책을 발표했음에도 물가는 여전히 ( ) 기세를 보이고 있다."', options: ['① 오를 대로 오른', '② 오를 세라', '③ 오를 듯한', '④ 오를 대로 오르는'], answer: 4 },
          { type: 'write', text: '[TOPIK II] Q51 (Writing). Заполните текстовый пропуск [ㄱ]:\n\n"하우스메이트를 구합니다. 방은 두 개이며, 거실과 주방을 함께 [ ㄱ ]. 관심 있으신 분은 연락 바랍니다."', sample: '사용하게 됩니다' }
        ]
      };

      // Прямой точечный выбор нужного варианта из репозитория
      const database = examRepository[examKey] || examRepository['topik1-v1'];
      const questions = Object.freeze(database);

      let currentIdx = 0;
      const userAnswers = new Array(questions.length).fill(null);

      function renderQuestion() {
        if (currentIdx >= questions.length) {
          finishExam();
          return;
        }

        const q = questions[currentIdx];
        
        document.getElementById('progress').style.width = `${(currentIdx / questions.length) * 100}%`;
        document.getElementById('q-meta').textContent = `Вариант: ${examKey.toUpperCase()} | Задание ${currentIdx + 1} из ${questions.length}`;
        document.getElementById('q-text').textContent = q.text;

        const zone = document.getElementById('interaction-zone');
        zone.innerHTML = '';

        if (q.type === 'choice') {
          const wrapper = document.createElement('div');
          wrapper.className = 'options-group';
          
          q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.onclick = () => saveChoiceAnswer(index + 1);
            wrapper.appendChild(btn);
          });
          
          zone.appendChild(wrapper);

        } else if (q.type === 'write') {
          const input = document.createElement('textarea');
          input.className = 'write-input';
          input.rows = 3;
          input.placeholder = 'Введите ваш ответ на корейском языке (только пропущенную фразу)...';
          input.id = 'write-field';

          const submitBtn = document.createElement('button');
          submitBtn.className = 'action-btn';
          submitBtn.textContent = 'Зафиксировать ответ и идти далее';
          submitBtn.onclick = () => saveWriteAnswer();

          zone.appendChild(input);
          zone.appendChild(submitBtn);
        }
      }

      function saveChoiceAnswer(selectedOption) {
        disableAllInputs();
        userAnswers[currentIdx] = selectedOption;

        setTimeout(() => {
          currentIdx++;
          renderQuestion();
        }, 300);
      }

      function saveWriteAnswer() {
        const field = document.getElementById('write-field');
        if (!field) return;

        const val = field.value.trim();
        if (!val) {
          alert('Пожалуйста, введите фразу для заполнения пропуска.');
          return;
        }

        disableAllInputs();
        userAnswers[currentIdx] = val;

        currentIdx++;
        renderQuestion();
      }

      function disableAllInputs() {
        document.querySelectorAll('.option-btn, #write-field, .action-btn').forEach(el => {
          el.disabled = true;
        });
      }

      function finishExam() {
        let correctCount = 0;

        questions.forEach((q, idx) => {
          const uAns = userAnswers[idx];
          if (q.type === 'choice') {
            if (Number(uAns) === Number(q.answer)) correctCount++;
          } else if (q.type === 'write') {
            const cleanUser = String(uAns).replace(/\s+/g, '').toLowerCase();
            const cleanSample = String(q.sample).replace(/\s+/g, '').toLowerCase();
            if (cleanUser === cleanSample) correctCount++;
          }
        });

        const resultsPayload = {
          examKey: examKey, // Передаем точный ключ варианта для результатов
          totalQuestions: questions.length,
          correctCount: correctCount,
          questions: questions.map(q => ({
            type: q.type,
            text: q.text,
            correctAnswer: q.options ? q.options[q.answer - 1] : null,
            sample: q.sample || null
          })),
          userAnswers: userAnswers.map((u, i) => {
            if (questions[i].type === 'choice') {
              return questions[i].options[u - 1] || 'Нет ответа';
            }
            return u;
          })
        };

        sessionStorage.setItem('topik_last_results', JSON.stringify(resultsPayload));
        window.location.href = 'results.html';
      }

      document.addEventListener('DOMContentLoaded', renderQuestion);
    })();
  </script>
</body>
</html>
