<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Официальный симулятор TOPIK · ILS Ultimate</title>
  <style>
    :root {
      --bg: #05070f;
      --card-bg: rgba(13, 18, 33, 0.65);
      --border: rgba(168, 85, 247, 0.2);
      --text: #f3f4f6;
      --text-muted: #8892b0;
      --purple: #a855f7;
      --cyan: #06b6d4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.2s ease; }
    body { background-color: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; padding: 40px 20px; }
    .container { max-width: 850px; margin: 0 auto; }

    .test-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 40px; backdrop-filter: blur(20px); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    
    .test-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .timer-badge { background: rgba(6, 182, 212, 0.1); border: 1px solid var(--cyan); color: var(--cyan); padding: 6px 14px; border-radius: 8px; font-weight: 700; font-variant-numeric: tabular-nums; }
    
    /* Обновленный интерактивный ИИ-плеер */
    .audio-player-container {
      background: rgba(6, 182, 212, 0.06); border: 1px solid rgba(6, 182, 212, 0.2);
      border-radius: 16px; padding: 18px; margin-bottom: 25px; display: flex; align-items: center; justify-content: space-between; gap: 15px;
    }
    .audio-info { display: flex; flex-direction: column; gap: 4px; }
    .audio-label { font-size: 0.8rem; font-weight: 700; color: var(--cyan); text-transform: uppercase; letter-spacing: 0.5px; }
    .audio-status { font-size: 0.9rem; color: var(--text-muted); }
    
    .play-tts-btn {
      background: linear-gradient(135deg, var(--cyan), #0891b2); color: #000; border: none;
      padding: 12px 24px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.95rem;
      display: flex; align-items: center; gap: 8px; box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
    }
    .play-tts-btn:hover { opacity: 0.9; transform: scale(1.02); }
    .play-tts-btn:disabled { background: #27272a; color: #71717a; cursor: not-allowed; box-shadow: none; }

    .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--cyan)); width: 0%; }
    
    .q-meta { font-size: 0.85rem; color: var(--purple); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .q-text { font-size: 1.25rem; font-weight: 700; margin-bottom: 30px; line-height: 1.6; color: #fff; white-space: pre-line; }

    .options-group { display: grid; grid-template-columns: 1fr; gap: 14px; }
    .option-btn {
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px;
      padding: 18px 22px; text-align: left; color: var(--text); font-size: 1.05rem; font-weight: 600; cursor: pointer;
    }
    .option-btn:hover { background: rgba(168, 85, 247, 0.08); border-color: rgba(168, 85, 247, 0.4); }
    .option-btn:disabled { cursor: not-allowed; opacity: 0.5; }

    .essay-area {
      width: 100%; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px;
      padding: 18px; color: #fff; font-size: 1.1rem; font-family: inherit; margin-bottom: 15px; resize: vertical;
    }
    .essay-area:focus { border-color: var(--cyan); outline: none; }
    .char-counter { font-size: 0.85rem; color: var(--text-muted); text-align: right; margin-bottom: 20px; }

    .action-btn {
      background: linear-gradient(135deg, var(--purple), #7c3aed); color: #fff; border: none;
      padding: 15px 35px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1rem;
    }
    .action-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  </style>
</head>
<body>

  <main class="container">
    <div class="test-card">
      <div class="test-header">
        <div class="q-meta" id="exam-title">Инициализация экзаменационного протокола...</div>
        <div class="timer-badge" id="timer">00:00</div>
      </div>
      
      <div id="audio-zone" style="display: none;">
        <div class="audio-player-container">
          <div class="audio-info">
            <div class="audio-label">🎧 Аудирование (듣기 평가)</div>
            <div class="audio-status" id="tts-status">Включите озвучку задания</div>
          </div>
          <button class="play-tts-btn" id="tts-trigger-btn">▶ Слушать текст</button>
        </div>
      </div>
      
      <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
      <div class="q-meta" id="q-number">Задание 1</div>
      <div class="q-text" id="q-text">Пожалуйста, подождите...</div>
      
      <div id="interaction-zone"></div>
    </div>
  </main>

  <script>
    (() => {
      'use strict';

      const urlParams = new URLSearchParams(window.location.search);
      const examKey = urlParams.get('exam') || 'topik1-v1';
      
      const variantNum = parseInt(examKey.replace(/[^0-9]/g, '')) || 1;
      const isTopik2 = examKey.includes('topik2');

      const topics = [
        { word: '날씨', opt: ['비가 옵니다', '맑습니다', '춥습니다', '바람이 붑니다'] },
        { word: '가족', opt: ['어머니', '아버지', '동생', '형'] },
        { word: '취미', opt: ['영화 보기', '사진 찍기', '음악 감상', '등산'] },
        { word: '음식', opt: ['김치찌개', '비빔밥', '불고기', '냉면'] },
        { word: '교통', opt: ['지하철', '버스', '택시', '비행기'] },
        { word: '과일', opt: ['사과', '바나나', '수박', '딸기'] },
        { word: '장소', opt: ['도서관', '백화점', '한국 은행', '우체국'] }
      ];

      const advancedGrammar = [
        ['오를 대로 오른', '오를 세라', '오를 듯한', '오를 대로 오르는'],
        ['줄어들 기세를', '줄어들다시피', '줄어들 대가', '줄어드는 대신에'],
        ['감안하더라도', '감안할 정도로', '감안하기 마련이라', '감안하는 척하면서'],
        ['배제할 수 없는', '배제하는 바람에', '배제하는 토대', '배제할 지경이다'],
        ['주목받기 시작했다', '주목받을 리가 없다', '주목받는 셈이다', '주목받도록 했다']
      ];

      // Стабильный генератор TOPIK I (Строго 1-30 вопросы содержат аудиоречь)
      function buildTopik1() {
        let list = [];
        for (let i = 1; i <= 70; i++) {
          const isListening = i <= 30;
          const sectionName = isListening ? '듣기 (Слушание)' : '읽기 (Чтение)';
          const tIdx = (i + variantNum) % topics.length;
          const currentTopic = topics[tIdx];
          
          // Текст, который ИИ будет зачитывать вслух
          const speechScript = `여기는 어디입니까? 다음을 듣고 알맞은 것을 고르십시오. 오늘 키워드는 ${currentTopic.opt[i % 4]} 입니다.`;

          list.push({
            type: 'choice',
            section: sectionName,
            text: isListening 
              ? `[듣기 제 ${i} 항] 녹음 내용을 주의 깊게 듣고 알맞은 답을 고르십시오.`
              : `[읽기 제 ${i} 항] 다음 문장을 읽고 문맥과 일чшающие понятия 선택하십시오.\n"우리는 오늘 ${currentTopic.opt[(i % 4)]}에 관심이 있습니다."`,
            options: currentTopic.opt.map(o => `① ${o}`),
            answer: ((i + variantNum) % 4) + 1,
            speechText: isListening ? speechScript : null
          });
        }
        return list;
      }

      // Стабильный генератор TOPIK II (1-50 вопросы содержат аудиоречь)
      function buildTopik2() {
        let list = [];
        for (let i = 1; i <= 50; i++) {
          const gIdx = (i + variantNum) % advancedGrammar.length;
          const speechScript = `다음 대화를 듣고 알맞은 대답을 고르십시오. 정부의 대책 방향성은 현 시점에서 매우 중요하게 다루어집니다.`;
          
          list.push({
            type: 'choice',
            section: '듣기 (Слушание)',
            text: `[듣기 제 ${i} 항] 다음 내용을 듣고 가장 이어질 수 있는 알맞은 문장을 선택하십시오.`,
            options: advancedGrammar[gIdx].map(g => `① ${g}`),
            answer: ((i + 2) % 4) + 1,
            speechText: speechScript
          });
        }

        // Письмо (51-54)
        const writingData = [
          { q: '51', txt: `[쓰기 제 51 항] 다음 공식 안내문을 읽고 빈칸에 들어갈 말을 적으십시오.\n\n"안녕하십니까, 관리사무소입니다. 주차장 도색 공사로 인해 내일부터 차량 진입이 [ ㄱ ]. 주민 여러분의 양해를 [ ㄴ ]."` },
          { q: '52', txt: `[쓰기 제 52 항] 다음 글을 읽고 문맥상 가장 자연스러운 단어를 쓰십시오.\n\n"인간의 기억력은 한계가 있다. 따라서 중요한 아이디어가 떠올랐을 때는 즉시 메모를 [ ㄱ ]. 메모를 하지 않으면 시간이 흐를수록 정보가 [ ㄴ ]."` },
          { q: '53', txt: `[쓰기 제 53 항] 다음 인포그래픽 자료를 바탕으로 '국내 반려동물 양육 가구 현황'에 대한 설명문을 작성하십시오 (200~300자).\n\n• 조사 기관: 농림축산식품부\n• 주요 변화: 2020년 대비 1인 가구의 반려동물 등록률 25% 증가` },
          { q: '54', txt: `[쓰기 제 54 항] '청소년기의 스마트폰 과의존 현상과 해결 방안'에 대해 자신의 생각을 서술하십시오 (600~700자).\n\n1. 스마트폰 과의존이 청소년기 발달에 미치는 부정적 영향\n2. 이를 예방하기 위한 가정과 학교의 역할\n3. 사회적 차원의 제도적 대책` }
        ];

        writingData.forEach(wd => {
          list.push({ type: 'write', section: `쓰기 (Письмо) — Q${wd.q}`, text: wd.txt, speechText: null });
        });

        // Чтение (55-104)
        for (let i = 55; i <= 104; i++) {
          const gIdx = (i + variantNum + 1) % advancedGrammar.length;
          list.push({
            type: 'choice',
            section: '읽기 (Чтение)',
            text: `[읽기 제 ${i - 4} 항] 다음 전문 학술 논문의 요약을 읽고 빈칸에 알맞은 표현을 고르십시오.\n"연구에 따르면 현대인들의 소비 흐름은 정보의 접근성에 의해 결정되는 경향이 강하다."`,
            options: advancedGrammar[gIdx].map(g => `① ${g}`),
            answer: ((i + 1) % 4) + 1,
            speechText: null
          });
        }

        return list;
      }

      const questions = Object.freeze(isTopik2 ? buildTopik2() : buildTopik1());
      let currentIdx = 0;
      const userAnswers = new Array(questions.length).fill(null);
      let timeLeft = isTopik2 ? 180 * 60 : 100 * 60;

      // Системная ИИ функция для синтеза корейской речи (Native Speech Synthesis)
      function speakKoreanText(text) {
        if (!('speechSynthesis' in window)) {
          alert('Ваш браузер не поддерживает синтез речи. Рекомендуется использовать Chrome.');
          return;
        }

        window.speechSynthesis.cancel(); // Остановка предыдущей речи
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ko-KR'; // Строго корейский языковой пакет
        utterance.rate = 0.85;    // Слегка замедленный темп для академического понимания

        const statusEl = document.getElementById('tts-status');
        const btn = document.getElementById('tts-trigger-btn');

        utterance.onstart = () => {
          statusEl.textContent = '🔊 Воспроизведение корейского текста...';
          btn.disabled = true;
        };

        utterance.onend = () => {
          statusEl.textContent = '✅ Прослушано. Выберите вариант ответа.';
          btn.disabled = false;
        };

        utterance.onerror = () => {
          statusEl.textContent = '❌ Ошибка речевого движка. Попробуйте ещё раз.';
          btn.disabled = false;
        };

        window.speechSynthesis.speak(utterance);
      }

      function startTimer() {
        const timerEl = document.getElementById('timer');
        const interval = setInterval(() => {
          if (timeLeft <= 0) {
            clearInterval(interval);
            finishExam();
            return;
          }
          timeLeft--;
          const mins = Math.floor(timeLeft / 60);
          const secs = timeLeft % 60;
          timerEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }, 1000);
      }

      function renderQuestion() {
        if (currentIdx >= questions.length) {
          finishExam();
          return;
        }

        window.speechSynthesis.cancel(); // Глушим звук при переходе на следующий вопрос
        const q = questions[currentIdx];
        
        document.getElementById('progress').style.width = `${(currentIdx / questions.length) * 100}%`;
        document.getElementById('exam-title').textContent = `${examKey.toUpperCase()} • ${q.section}`;
        document.getElementById('q-number').textContent = `Задание ${currentIdx + 1} из ${questions.length}`;
        document.getElementById('q-text').textContent = q.text;

        // Настройка ИИ-аудиозоны
        const audioZone = document.getElementById('audio-zone');
        const btn = document.getElementById('tts-trigger-btn');
        const statusEl = document.getElementById('tts-status');

        if (q.speechText) {
          audioZone.style.display = 'block';
          statusEl.textContent = 'Включите озвучку задания';
          btn.disabled = false;
          btn.onclick = () => speakKoreanText(q.speechText);
        } else {
          audioZone.style.display = 'none';
        }

        const zone = document.getElementById('interaction-zone');
        zone.innerHTML = '';

        if (q.type === 'choice') {
          const wrapper = document.createElement('div');
          wrapper.className = 'options-group';
          
          q.options.forEach((opt, index) => {
            const btnOpt = document.createElement('button');
            btnOpt.className = 'option-btn';
            btnOpt.textContent = opt;
            btnOpt.onclick = () => saveChoiceAnswer(index + 1);
            wrapper.appendChild(btnOpt);
          });
          
          zone.appendChild(wrapper);

        } else if (q.type === 'write') {
          const textarea = document.createElement('textarea');
          textarea.className = 'essay-area';
          textarea.rows = q.section.includes('Q54') ? 10 : 4;
          textarea.placeholder = '답안을 한국어로 입력하십시오...';
          textarea.id = 'essay-field';

          const counter = document.createElement('div');
          counter.className = 'char-counter';
          counter.textContent = 'Знаков: 0';
          textarea.oninput = (e) => { counter.textContent = `Знаков: ${e.target.value.length}`; };

          const submitBtn = document.createElement('button');
          submitBtn.className = 'action-btn';
          submitBtn.textContent = 'Зафиксировать ответ и перейти далее';
          submitBtn.onclick = () => saveWriteAnswer();

          zone.appendChild(textarea);
          zone.appendChild(counter);
          zone.appendChild(submitBtn);
        }
      }

      function saveChoiceAnswer(selectedOption) {
        userAnswers[currentIdx] = selectedOption;
        currentIdx++;
        renderQuestion();
      }

      function saveWriteAnswer() {
        const field = document.getElementById('essay-field');
        if (!field) return;

        const val = field.value.trim();
        if (!val) {
          alert('Бланк ответа не может быть пустым.');
          return;
        }

        userAnswers[currentIdx] = val;
        currentIdx++;
        renderQuestion();
      }

      function finishExam() {
        let correctCount = 0;
        questions.forEach((q, idx) => {
          const uAns = userAnswers[idx];
          if (q.type === 'choice' && Number(uAns) === Number(q.answer)) correctCount++;
          if (q.type === 'write' && String(uAns).length > 5) correctCount++;
        });

        const resultsPayload = {
          examKey: examKey,
          totalQuestions: questions.length,
          correctCount: correctCount,
          questions: questions.map(q => ({ type: q.type, text: q.text })),
          userAnswers: userAnswers
        };

        sessionStorage.setItem('topik_last_results', JSON.stringify(resultsPayload));
        window.location.href = 'results.html';
      }

      document.addEventListener('DOMContentLoaded', () => {
        startTimer();
        renderQuestion();
      });
    })();
  </script>
</body>
</html>
