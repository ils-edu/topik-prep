<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Панель управления TOPIK · ILS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Премиальные стили для High-End интерфейса */
    :root {
      --primary: #a855f7;
      --primary-glow: rgba(168, 85, 247, 0.4);
      --bg-main: #090d16;
      --bg-card: rgba(17, 24, 39, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --radius-lg: 24px;
      --radius-md: 16px;
    }

    body {
      background-color: var(--bg-main);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(168, 85, 247, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(192, 132, 252, 0.08) 0%, transparent 40%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Верхнее меню */
    .site-header {
      background: rgba(9, 13, 22, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-kor {
      background: linear-gradient(135deg, #a855f7, #c084fc);
      color: #0f172a;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 8px;
      box-shadow: 0 0 15px var(--primary-glow);
    }

    /* Приветственный блок нового поколения */
    .welcome-hero {
      background: linear-gradient(135deg, rgba(24, 18, 43, 0.9), rgba(15, 23, 42, 0.9));
      border: 1px solid rgba(168, 85, 247, 0.2);
      border-radius: var(--radius-lg);
      padding: 40px;
      margin-top: 40px;
      margin-bottom: 30px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    .welcome-hero::after {
      content: '';
      position: absolute;
      top: -50%; right: -20%;
      width: 300px; height: 300px;
      background: var(--primary);
      filter: blur(120px);
      opacity: 0.2;
    }
    .welcome-hero h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    /* Виджеты статистики */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      backdrop-filter: blur(8px);
    }
    .stat-icon {
      font-size: 1.8rem;
      background: rgba(168, 85, 247, 0.15);
      width: 50px; height: 50px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 12px;
      color: #c084fc;
    }
    .stat-val { font-size: 1.4rem; font-weight: 700; color: #fff; }
    .stat-lbl { font-size: 0.8rem; color: var(--text-muted); }

    /* Таб-фильтр уровней */
    .filter-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 25px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }
    .filter-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 1rem;
      font-weight: 600;
      padding: 8px 16px;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
    }
    .filter-btn.active {
      color: #c084fc;
    }
    .filter-btn.active::after {
      content: '';
      position: absolute;
      bottom: -13px; left: 0; right: 0;
      height: 3px;
      background: #a855f7;
      border-radius: 3px;
      box-shadow: 0 0 10px var(--primary-glow);
    }

    /* Премиальная сетка карточек */
    .variants-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }
    .variant-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 24px;
      text-align: left;
      position: relative;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(8px);
    }
    .variant-card:hover {
      border-color: rgba(168, 85, 247, 0.5);
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(168, 85, 247, 0.15);
    }
    .card-badge {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #c084fc;
      background: rgba(168, 85, 247, 0.1);
      padding: 4px 8px;
      border-radius: 6px;
      display: inline-block;
      margin-bottom: 12px;
    }
    .variant-card h4 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }
    .card-meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-launch {
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      color: #fff;
      font-weight: 600;
      text-align: center;
      padding: 10px 0;
      border-radius: 10px;
      display: block;
      text-decoration: none;
      transition: opacity 0.2s, box-shadow 0.2s;
    }
    .btn-launch:hover {
      opacity: 0.9;
      box-shadow: 0 0 15px rgba(124, 58, 237, 0.4);
    }
  </style>
</head>
<body class="dashboard-page">
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <span class="logo-kor">한국</span>
        <span class="logo-text">TOPIK.ILS</span>
      </a>
      <nav class="nav">
        <a href="index.html" class="active">Симуляторы</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <!-- Блок приветствия Премиум уровня -->
    <div class="welcome-hero">
      <h1>TOPIK Mock Exams 🇰🇷</h1>
      <p style="color: var(--text-muted); max-width: 600px; line-height: 1.6;">
        Добро пожаловать в интеллектуальную систему симуляции экзамена по корейскому языку. Все варианты укомплектованы аудио-движком и мгновенной AI-проверкой.
      </p>
    </div>

    <!-- Блок Статистики -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">🎯</div>
        <div>
          <div class="stat-val">10 Вариантов</div>
          <div class="stat-lbl">Доступно к сдаче</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⚡</div>
        <div>
          <div class="stat-val">Smart</div>
          <div class="stat-lbl">Система аудио ИИ</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🔥</div>
        <div>
          <div class="stat-val">Free</div>
          <div class="stat-lbl">Полный доступ ILS</div>
        </div>
      </div>
    </div>

    <!-- Вкладки фильтрации уровней -->
    <div class="filter-tabs">
      <button class="filter-btn active" onclick="switchLevel('all')">Все тесты</button>
      <button class="filter-btn" onclick="switchLevel('topik1')">TOPIK I (1-2 Гып)</button>
      <button class="filter-btn" onclick="switchLevel('topik2')">TOPIK II (3-6 Гып)</button>
    </div>

    <!-- Сетка тестов -->
    <div class="variants-grid" id="variants-container">
      <!-- Генерируется через JS -->
    </div>
  </main>

  <script>
    const examData = [
      // Генерируем структуру динамически
    ];

    // Заполнение структуры тестов
    for(let v=1; v<=5; v++) {
      examData.push({ id: `topik1-v${v}`, level: 'topik1', levelName: 'TOPIK I', name: `Вариант 0${v}`, parts: '2 Sections' });
    }
    for(let v=1; v<=5; v++) {
      examData.push({ id: `topik2-v${v}`, level: 'topik2', levelName: 'TOPIK II', name: `Вариант 0${v}`, parts: '3 Sections' });
    }

    function renderCards(filter = 'all') {
      const container = document.getElementById('variants-container');
      container.innerHTML = '';

      examData.forEach(exam => {
        if (filter !== 'all' && exam.level !== filter) return;

        const card = document.createElement('div');
        card.className = 'variant-card';
        card.innerHTML = `
          <span class="card-badge">${exam.levelName}</span>
          <h4>${exam.name}</h4>
          <div class="card-meta">
            <span>⏱ 40 мин</span> • <span>${exam.parts}</span>
          </div>
          <a href="test.html?exam=${exam.id}" class="btn-launch">Запустить тест</a>
        `;
        container.appendChild(card);
      });
    }

    function switchLevel(level) {
      // Переключение активного класса у кнопок
      const buttons = document.querySelectorAll('.filter-btn');
      buttons.forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');

      renderCards(level);
    }

    // Первый рендер при загрузке
    document.addEventListener('DOMContentLoaded', () => renderCards('all'));
  </script>
</body>
</html>
